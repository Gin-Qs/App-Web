<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Gin-Qs Logistics</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Gin-Qs Dashboard</div>
      <nav>
        <a class="button button-secondary" href="index.html">Website</a>
        <a class="button" href="login.html">Switch user</a>
      </nav>
    </header>
    <main class="container">
      <h1 id="dashboard-title">Dashboard</h1>
      <p id="dashboard-subtitle"></p>

      <section class="card">
        <h2>Live Cargo Location</h2>
        <p id="live-coords"></p>
        <iframe
          id="live-map"
          title="Live cargo map"
          loading="lazy"
          width="100%"
          height="260"
          sandbox="allow-scripts allow-same-origin"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </section>

      <section class="grid" id="role-panels"></section>
    </main>

    <script src="assets/app.js"></script>
  </body>
</html>
